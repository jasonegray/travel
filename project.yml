name: PackList
options:
  bundleIdPrefix: com.level19
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ALWAYS_SEARCH_USER_PATHS: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  PackList:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PackList
        excludes:
          - "Tests/**"
    info:
      path: PackList/Info.plist
      properties:
        CFBundleDisplayName: PackList
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.level19.PackList
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PackListTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PackList/Tests
    dependencies:
      - target: PackList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.level19.PackListTests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
